<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Quiz Alephium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#06050c;
    --card:#0e0b1c;
    --card2:#120e24;
    --purple:#8b6bff;
    --purple-deep:#4c2fb5;
    --coral:#ff6a5c;
    --coral-soft:#ffab7a;
    --text:#f3f1fb;
    --muted:#9d97b8;
    --ok:#2fe6b8;
    --wrong:#ff4d6d;
    --border:rgba(255,255,255,.12);
    --display-font:'Orbitron', 'Manrope', sans-serif;
    --body-font:'Manrope', 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  body{
    margin:0;
    font-family:var(--body-font);
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:0 0 32px;
  }
  .page{
    width:100%;
    max-width:680px;
  }

  /* ---------- HERO / DA RETROWAVE ---------- */
  .hero{
    position:relative;
    width:100%;
    aspect-ratio:2/1;
    max-height:340px;
    overflow:hidden;
    background:#06050c;
  }
  .hero svg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    display:block;
  }
  .hero-top{
    position:absolute;
    top:0; left:0; right:0;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:clamp(10px,3vw,18px) clamp(12px,4vw,20px);
    z-index:3;
  }
  .alpha-badge{
    display:inline-flex;
    align-items:center;
    gap:5px;
    padding:5px 11px;
    border-radius:20px;
    background:rgba(6,5,12,.55);
    backdrop-filter:blur(4px);
    color:var(--coral-soft);
    font-family:var(--display-font);
    font-weight:700;
    font-size:clamp(.6rem,2.4vw,.68rem);
    text-transform:uppercase;
    letter-spacing:.08em;
    border:1px solid rgba(255,171,122,.45);
    white-space:nowrap;
  }
  .lang-switch{
    display:flex;
    gap:5px;
    background:rgba(6,5,12,.55);
    backdrop-filter:blur(4px);
    border:1px solid var(--border);
    border-radius:20px;
    padding:3px;
  }
  .lang-btn{
    background:transparent;
    border:none;
    color:var(--muted);
    padding:5px 10px;
    border-radius:16px;
    font-size:clamp(.65rem,2.4vw,.74rem);
    font-weight:700;
    cursor:pointer;
    letter-spacing:.03em;
    font-family:var(--body-font);
    transition:all .15s ease;
  }
  .lang-btn.active{
    background:var(--purple);
    color:#0a0616;
  }
  .lang-btn:not(.active):hover{color:var(--text);}

  .hero-bottom{
    position:absolute;
    left:0; right:0; bottom:0;
    z-index:3;
    padding:0 clamp(14px,4.5vw,26px) clamp(12px,3.5vw,20px);
    display:flex;
    align-items:center;
    gap:clamp(8px,2.5vw,14px);
  }
  .mark{
    flex:0 0 auto;
    height:clamp(30px,8vw,44px);
    width:auto;
  }
  .wordmark{
    display:flex;
    flex-direction:column;
    line-height:1;
  }
  .wordmark .brand{
    font-family:var(--display-font);
    font-weight:800;
    font-size:clamp(1.35rem,6.5vw,2.1rem);
    color:#fdfdff;
    letter-spacing:.01em;
  }
  .wordmark .sub{
    font-family:var(--body-font);
    font-weight:600;
    font-size:clamp(.68rem,2.6vw,.85rem);
    color:var(--coral-soft);
    letter-spacing:.14em;
    text-transform:uppercase;
    margin-top:2px;
  }

  /* ---------- BODY / QUIZ CARD ---------- */
  .content{
    padding:clamp(14px,4vw,20px) clamp(14px,4vw,20px) 0;
  }
  .subtitle{
    color:var(--muted);
    margin:0 0 16px;
    font-size:clamp(.82rem,3vw,.95rem);
    text-align:center;
  }
  .meta-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:8px;
    font-size:clamp(.7rem,2.6vw,.78rem);
    color:var(--muted);
    letter-spacing:.03em;
  }
  .category-tag{
    display:inline-block;
    padding:3px 11px;
    border-radius:20px;
    background:rgba(139,107,255,.14);
    color:var(--purple);
    font-family:var(--display-font);
    font-weight:700;
    font-size:clamp(.6rem,2.4vw,.7rem);
    text-transform:uppercase;
    letter-spacing:.06em;
    border:1px solid rgba(139,107,255,.4);
  }
  .progress-wrap{
    height:7px;
    background:var(--border);
    border-radius:6px;
    overflow:hidden;
    margin-bottom:18px;
  }
  .progress-bar{
    height:100%;
    background:linear-gradient(90deg,var(--purple),var(--coral));
    width:0%;
    transition:width .35s ease;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:clamp(18px,5vw,28px);
    box-shadow:0 12px 30px rgba(0,0,0,.45);
  }
  .qnum{
    color:var(--purple);
    font-family:var(--display-font);
    font-weight:700;
    font-size:clamp(.72rem,2.8vw,.85rem);
    letter-spacing:.06em;
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .question{
    font-size:clamp(1.02rem,4.2vw,1.18rem);
    line-height:1.5;
    margin-bottom:20px;
    font-weight:600;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .option{
    text-align:left;
    background:var(--card2);
    border:1px solid var(--border);
    color:var(--text);
    padding:14px 16px;
    border-radius:12px;
    cursor:pointer;
    font-size:clamp(.9rem,3.4vw,.98rem);
    font-family:var(--body-font);
    min-height:48px;
    transition:all .15s ease;
  }
  .option:hover:not(:disabled){
    border-color:var(--purple);
    background:#161030;
  }
  .option:focus-visible{
    outline:2px solid var(--purple);
    outline-offset:2px;
  }
  .option.correct{
    border-color:var(--ok);
    background:rgba(47,230,184,.12);
    font-weight:700;
    color:#eafffa;
  }
  .option.wrong{
    border-color:var(--wrong);
    background:rgba(255,77,109,.12);
  }
  .option:disabled{cursor:default;}
  .explain{
    margin-top:16px;
    padding:14px 16px;
    border-radius:12px;
    background:var(--card2);
    border-left:3px solid var(--purple);
    font-size:clamp(.82rem,3.2vw,.9rem);
    color:var(--muted);
    display:none;
    line-height:1.55;
  }
  .explain.show{display:block;}
  .footer-row{
    display:flex;
    justify-content:flex-end;
    margin-top:20px;
  }
  button.next{
    background:linear-gradient(90deg,var(--purple),#a78bff);
    color:#0a0616;
    border:none;
    padding:12px 24px;
    border-radius:10px;
    font-weight:800;
    font-family:var(--display-font);
    cursor:pointer;
    font-size:clamp(.82rem,3.2vw,.92rem);
    display:none;
    width:100%;
  }
  button.next.show{display:inline-block;}
  button.next:hover{filter:brightness(1.08);}
  button.next:active{transform:scale(.99);}

  .result{text-align:center;}
  .result .score{
    font-family:var(--display-font);
    font-size:clamp(2.4rem,11vw,3.2rem);
    font-weight:800;
    background:linear-gradient(90deg,var(--purple),var(--coral));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    margin:8px 0;
  }
  .result .msg{
    color:var(--muted);
    margin-bottom:16px;
    font-size:clamp(.88rem,3.4vw,1rem);
    padding:0 4px;
  }
  .breakdown{
    text-align:left;
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:22px;
    font-size:clamp(.82rem,3.2vw,.9rem);
  }
  .breakdown-row{
    display:flex;
    justify-content:space-between;
    padding:5px 0;
    color:var(--muted);
  }
  .breakdown-row b{color:var(--text);}
  button.restart{
    background:transparent;
    border:1px solid var(--purple);
    color:var(--purple);
    padding:11px 22px;
    border-radius:10px;
    cursor:pointer;
    font-weight:700;
    font-family:var(--display-font);
    font-size:clamp(.8rem,3vw,.9rem);
    width:100%;
  }
  button.restart:hover{background:rgba(139,107,255,.1);}

  footer.build-tag{
    text-align:center;
    margin:18px 0 4px;
    color:var(--muted);
    font-size:clamp(.65rem,2.6vw,.72rem);
    letter-spacing:.03em;
    padding:0 14px;
  }

  @media (prefers-reduced-motion: reduce){
    .sun-pulse, .scan-drift{animation:none !important;}
  }
</style>
</head>

let lang = 'fr';
let current = 0;
let score = 0;
const answersLog = [];
const quizCard = document.getElementById('quizCard');
const progressBar = document.getElementById('progressBar');
const categoryTag = document.getElementById('categoryTag');
const counter = document.getElementById('counter');
const subtitle = document.getElementById('subtitle');
const heroSub = document.getElementById('heroSub');
const buildTag = document.getElementById('buildTag');

function applyLangUI(){
  const t = ui[lang];
  subtitle.textContent = t.subtitle;
  heroSub.textContent = t.heroSub;
  buildTag.textContent = t.buildTag;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
}

document.getElementById('langSwitch').addEventListener('click', (e) => {
  const btn = e.target.closest('.lang-btn');
  if(!btn) return;
  lang = btn.dataset.lang;
  applyLangUI();
  if(current < questions.length){
    renderQuestion();
  } else {
    renderResult();
  }
});

function renderQuestion(){
  const t = ui[lang];
  const item = questions[current];
  progressBar.style.width = (current / questions.length * 100) + '%';
  categoryTag.textContent = item.cat[lang];
  counter.textContent = `${t.question} ${current + 1} / ${questions.length}`;

  quizCard.innerHTML = `
    <div class="qnum">${item.cat[lang]}</div>
    <div class="question">${item.q[lang]}</div>
    <div class="options" id="options"></div>
    <div class="explain" id="explain">${item.explain[lang]}</div>
    <div class="footer-row"><button class="next" id="nextBtn">${t.next}</button></div>
  `;

  const optionsWrap = document.getElementById('options');
  item.options[lang].forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(idx);
    optionsWrap.appendChild(btn);
  });
}

function selectAnswer(idx){
  const t = ui[lang];
  const item = questions[current];
  const buttons = document.querySelectorAll('.option');
  buttons.forEach(b => b.disabled = true);

  const isCorrect = idx === item.correct;
  if(isCorrect){
    buttons[idx].classList.add('correct');
    score++;
  } else {
    buttons[idx].classList.add('wrong');
    buttons[item.correct].classList.add('correct');
  }
  answersLog.push({ cat: item.cat, correct: isCorrect });

  document.getElementById('explain').classList.add('show');
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.add('show');
  nextBtn.textContent = current === questions.length - 1 ? t.seeResult : t.next;
  nextBtn.onclick = () => {
    current++;
    if(current < questions.length){
      renderQuestion();
    } else {
      renderResult();
    }
  };
}

function renderResult(){
  const t = ui[lang];
  progressBar.style.width = '100%';
  counter.textContent = t.finished;
  categoryTag.textContent = t.resultTag;
  const pct = Math.round(score / questions.length * 100);
  let msg;
  if(pct === 100) msg = t.msgPerfect;
  else if(pct >= 70) msg = t.msgGood;
  else if(pct >= 40) msg = t.msgOk;
  else msg = t.msgLow;

  const categories = [...new Set(questions.map(q => q.cat[lang]))];
  const breakdownRows = categories.map(catLabel => {
    const total = answersLog.filter(a => a.cat[lang] === catLabel).length;
    const good = answersLog.filter(a => a.cat[lang] === catLabel && a.correct).length;
    return `<div class="breakdown-row"><span>${catLabel}</span><b>${good} / ${total}</b></div>`;
  }).join('');

  quizCard.innerHTML = `
    <div class="result">
      <div class="qnum">${t.finalResult}</div>
      <div class="score">${score} / ${questions.length}</div>
      <div class="msg">${msg}</div>
      <div class="breakdown">${breakdownRows}</div>
      <button class="restart" id="restartBtn">${t.restart}</button>
    </div>
  `;
  document.getElementById('restartBtn').onclick = () => {
    current = 0;
    score = 0;
    answersLog.length = 0;
    renderQuestion();
  };
}

applyLangUI();
renderQuestion();
</script>
