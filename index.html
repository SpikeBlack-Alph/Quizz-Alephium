<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz Alephium</title>
<style>
  :root{
    --bg:#0d1117;
    --card:#161b22;
    --accent:#00d4a0;
    --accent-dark:#00a37a;
    --accent2:#3fd1ff;
    --text:#e6edf3;
    --muted:#8b949e;
    --wrong:#f85149;
    --border:#30363d;
    --alpha:#ffb020;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(circle at 15% 0%, rgba(0,212,160,.08), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(63,209,255,.08), transparent 40%),
      linear-gradient(160deg,#0d1117,#0c1220);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:32px 16px;
  }
  .container{
    width:100%;
    max-width:660px;
  }
  .top-row{
    display:flex;
    justify-content:flex-end;
    margin-bottom:12px;
    gap:6px;
  }
  .lang-btn{
    background:#0d1117;
    border:1px solid var(--border);
    color:var(--muted);
    padding:6px 12px;
    border-radius:20px;
    font-size:.78rem;
    font-weight:700;
    cursor:pointer;
    letter-spacing:.03em;
    transition:all .15s ease;
  }
  .lang-btn:hover{border-color:var(--accent);color:var(--text);}
  .lang-btn.active{
    background:rgba(0,212,160,.14);
    border-color:var(--accent);
    color:var(--accent);
  }
  header{
    text-align:center;
    margin-bottom:20px;
  }
  .title-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }
  header h1{
    font-size:1.8rem;
    margin:0;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .alpha-badge{
    display:inline-block;
    padding:3px 10px;
    border-radius:20px;
    background:rgba(255,176,32,.14);
    color:var(--alpha);
    font-weight:800;
    font-size:.68rem;
    text-transform:uppercase;
    letter-spacing:.08em;
    border:1px solid rgba(255,176,32,.45);
    white-space:nowrap;
  }
  header p{
    color:var(--muted);
    margin:6px 0 0;
    font-size:0.95rem;
  }
  .meta-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
    font-size:.78rem;
    color:var(--muted);
    letter-spacing:.03em;
  }
  .category-tag{
    display:inline-block;
    padding:3px 10px;
    border-radius:20px;
    background:rgba(0,212,160,.12);
    color:var(--accent);
    font-weight:700;
    font-size:.72rem;
    text-transform:uppercase;
    letter-spacing:.06em;
    border:1px solid rgba(0,212,160,.35);
  }
  .progress-wrap{
    height:8px;
    background:var(--border);
    border-radius:6px;
    overflow:hidden;
    margin-bottom:22px;
  }
  .progress-bar{
    height:100%;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    width:0%;
    transition:width .35s ease;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:28px;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
  }
  .qnum{
    color:var(--accent);
    font-weight:600;
    font-size:.85rem;
    letter-spacing:.06em;
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .question{
    font-size:1.15rem;
    line-height:1.5;
    margin-bottom:22px;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .option{
    text-align:left;
    background:#0d1117;
    border:1px solid var(--border);
    color:var(--text);
    padding:14px 16px;
    border-radius:10px;
    cursor:pointer;
    font-size:.98rem;
    transition:all .15s ease;
  }
  .option:hover:not(:disabled){
    border-color:var(--accent);
    background:#111f1c;
  }
  .option.correct{
    border-color:var(--accent);
    background:rgba(0,212,160,.15);
    font-weight:600;
  }
  .option.wrong{
    border-color:var(--wrong);
    background:rgba(248,81,73,.12);
  }
  .option:disabled{
    cursor:default;
  }
  .explain{
    margin-top:18px;
    padding:14px 16px;
    border-radius:10px;
    background:#0d1117;
    border-left:3px solid var(--accent);
    font-size:.9rem;
    color:var(--muted);
    display:none;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .footer-row{
    display:flex;
    justify-content:flex-end;
    margin-top:22px;
  }
  button.next{
    background:var(--accent);
    color:#03251c;
    border:none;
    padding:11px 22px;
    border-radius:8px;
    font-weight:700;
    cursor:pointer;
    font-size:.95rem;
    display:none;
  }
  button.next.show{display:inline-block;}
  button.next:hover{background:var(--accent-dark);}
  .result{
    text-align:center;
  }
  .result .score{
    font-size:3rem;
    font-weight:800;
    color:var(--accent);
    margin:10px 0;
  }
  .result .msg{
    color:var(--muted);
    margin-bottom:14px;
    font-size:1rem;
  }
  .breakdown{
    text-align:left;
    background:#0d1117;
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:22px;
    font-size:.88rem;
  }
  .breakdown-row{
    display:flex;
    justify-content:space-between;
    padding:4px 0;
    color:var(--muted);
  }
  .breakdown-row b{color:var(--text);}
  button.restart{
    background:transparent;
    border:1px solid var(--accent);
    color:var(--accent);
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
  }
  button.restart:hover{
    background:rgba(0,212,160,.1);
  }
  footer.build-tag{
    text-align:center;
    margin-top:16px;
    color:var(--muted);
    font-size:.72rem;
    letter-spacing:.03em;
  }
</style>
</head>

let lang = 'fr';
let current = 0;
let score = 0;
const answersLog = [];
const quizCard = document.getElementById('quizCard');
const progressBar = document.getElementById('progressBar');
const categoryTag = document.getElementById('categoryTag');
const counter = document.getElementById('counter');
const subtitle = document.getElementById('subtitle');
const alphaBadge = document.getElementById('alphaBadge');
const buildTag = document.getElementById('buildTag');

function applyLangUI(){
  const t = ui[lang];
  subtitle.textContent = t.subtitle;
  alphaBadge.textContent = t.alphaBadge;
  buildTag.textContent = t.buildTag;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
}

document.getElementById('langSwitch').addEventListener('click', (e) => {
  const btn = e.target.closest('.lang-btn');
  if(!btn) return;
  lang = btn.dataset.lang;
  applyLangUI();
  if(current < questions.length){
    renderQuestion();
  } else {
    renderResult();
  }
});

function renderQuestion(){
  const t = ui[lang];
  const item = questions[current];
  progressBar.style.width = (current / questions.length * 100) + '%';
  categoryTag.textContent = item.cat[lang];
  counter.textContent = `${t.question} ${current + 1} / ${questions.length}`;

  quizCard.innerHTML = `
    <div class="qnum">${item.cat[lang]}</div>
    <div class="question">${item.q[lang]}</div>
    <div class="options" id="options"></div>
    <div class="explain" id="explain">${item.explain[lang]}</div>
    <div class="footer-row"><button class="next" id="nextBtn">${t.next}</button></div>
  `;

  const optionsWrap = document.getElementById('options');
  item.options[lang].forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(idx);
    optionsWrap.appendChild(btn);
  });
}

function selectAnswer(idx){
  const t = ui[lang];
  const item = questions[current];
  const buttons = document.querySelectorAll('.option');
  buttons.forEach(b => b.disabled = true);

  const isCorrect = idx === item.correct;
  if(isCorrect){
    buttons[idx].classList.add('correct');
    score++;
  } else {
    buttons[idx].classList.add('wrong');
    buttons[item.correct].classList.add('correct');
  }
  answersLog.push({ cat: item.cat, correct: isCorrect });

  document.getElementById('explain').classList.add('show');
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.add('show');
  nextBtn.textContent = current === questions.length - 1 ? t.seeResult : t.next;
  nextBtn.onclick = () => {
    current++;
    if(current < questions.length){
      renderQuestion();
    } else {
      renderResult();
    }
  };
}

function renderResult(){
  const t = ui[lang];
  progressBar.style.width = '100%';
  counter.textContent = t.finished;
  categoryTag.textContent = t.resultTag;
  const pct = Math.round(score / questions.length * 100);
  let msg;
  if(pct === 100) msg = t.msgPerfect;
  else if(pct >= 70) msg = t.msgGood;
  else if(pct >= 40) msg = t.msgOk;
  else msg = t.msgLow;

  const categories = [...new Set(questions.map(q => q.cat[lang]))];
  const breakdownRows = categories.map(catLabel => {
    const total = answersLog.filter(a => a.cat[lang] === catLabel).length;
    const good = answersLog.filter(a => a.cat[lang] === catLabel && a.correct).length;
    return `<div class="breakdown-row"><span>${catLabel}</span><b>${good} / ${total}</b></div>`;
  }).join('');

  quizCard.innerHTML = `
    <div class="result">
      <div class="qnum">${t.finalResult}</div>
      <div class="score">${score} / ${questions.length}</div>
      <div class="msg">${msg}</div>
      <div class="breakdown">${breakdownRows}</div>
      <button class="restart" id="restartBtn">${t.restart}</button>
    </div>
  `;
  document.getElementById('restartBtn').onclick = () => {
    current = 0;
    score = 0;
    answersLog.length = 0;
    renderQuestion();
  };
}

applyLangUI();
renderQuestion();
</script>
